# ──────────────────────────────────────────────────────
# Akagami — ClearTax Bug Bounty Mission Config
# Program: Clear Tax Bounty Initiative
# ──────────────────────────────────────────────────────

mission:
  target: cleartax.in
  mission_name: "ClearTax Bug Bounty — Phase 1 Recon"
  company_name: "ClearTax"

scope:
  in_scope:
    - "*.cleartax.com"
    - "*.clear.in"
    - "*.cleartax.in"
    - "cleartax.com"
    - "clear.in"
    - "cleartax.in"
  out_of_scope:
    - "one.clear.in"
    - "app.clear.in/clear-invoicing"
    - "app.clear.in/partner-portal"
    - "app.clear.in/apvm"

permissions:
  active_scanning: true

opsec:
  enabled: true

# Custom headers injected into all HTTP-based tools (httpx, ffuf, nuclei)
# ClearTax requires this header for all fuzzing activities
custom_headers:
  X-Comolho-Client: "akagami-recon"

# Bug bounty notes (for report context):
# - Only Critical and High vulns are rewarded
# - Fuzzing requires header: X-Comolho-Client (auto-injected above)
# - Focus: IDOR, Privilege Escalation, Injections, Unauth API
# - Limited exploitation: SSRF, SSTI→RCE (stop after PoC)
# - No DoS, no other users' data, no social engineering
